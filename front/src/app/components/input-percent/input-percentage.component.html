<div class="input-container">
    <form [formGroup]="valueForm">
        <input formControlName="percentage" class="main-input" type="number" (keyup)="keyPressed=true"
            #percentageInput /><span class="percent">{{
            percentageInput.value && etpMode !==true ? '%' : '' }}</span><span class="compute">{{
            returnPercentage(percentageInput.value,true) }}
        </span>
    </form>
</div>
