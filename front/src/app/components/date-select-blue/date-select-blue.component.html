@if (manualInput && readOnly === false) {
<input #manualEl class="manual-input title" type="text" [value]="manualFocused ? editValue : (realValue || '')"
  (input)="onManualInput(manualEl)" (focus)="onEditFocus()" (blur)="onEditBlur()" (keydown.enter)="manualEl.blur()"
  (click)="$event.stopPropagation()" placeholder="JJ/MM/AAAA" />
} @else {
<p (click)="readOnly === false ? picker.open() : null" class="title">
  {{ realValue }}
</p>
}
<div class="space" (click)="readOnly === false ? picker.open() : null"></div>
<div class="icon" (click)="readOnly === false ? picker.open() : null">
  <mat-icon>{{ icon }}</mat-icon>
  <div class="triangle {{ side }}"></div>
</div>
<input matInput [ngModel]="value" [matDatepicker]="picker" (ngModelChange)="onDateChanged($event)" [min]="min"
  [max]="max" class="{{ side }}" />

<mat-datepicker #picker></mat-datepicker>
